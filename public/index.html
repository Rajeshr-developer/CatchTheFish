<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatchTheFish</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        margin: 0; padding: 0;
        overflow: hidden;
        background: #000;
      }
      #root {
        width: 100vw; height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
      }
      /* Scale the 1920×1080 game canvas to fit the viewport */
      #game-scale-wrapper {
        position: relative;
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
